# Lesson B-03: Raga Yaman — The Evening Raga
# Journey: Beginner | Level: Shishya (1-3)
# Presence Rule: you hear before you name.
# Engine source: engine/theory/ragas/yaman.ts
# Prahara: 5-6 (late evening / first prahar of night)

id: beginner-03-yaman
journey: beginner
level_range: [1, 3]          # Shishya
raga_id: yaman
duration_target_min: 12
xp_award: 35

meta:
  title: "The Evening Raga"
  subtitle: "Raga Yaman"
  time_of_day: evening        # prahara 5-6
  rasa: shant                 # peace, devotion

# --- PHASES -------------------------------------------------------

phases:

  # 1. LISTENING — tanpura drone, Yaman context
  - id: listen
    type: tanpura_drone
    duration_s: 30
    instruction: |
      Close your eyes. Listen.
      The tanpura is with you. Evening light.
    tanpura:
      strings: [Pa, Sa, Sa, Sa_upper]
      sa_hz: null

  # 2. SA DETECTION
  - id: sa_calibration
    type: sa_detection
    skip_if: sa_already_set
    instruction: |
      Let's confirm your Sa.
      Hum or sing a comfortable note. Hold it steady.
    attempts: 5
    min_clarity: 0.85
    fallback_hz: 261.6256

  # 3. HEAR THE AROHA — Ni Re Ga Ma(t) Pa Dha Ni Sa'
  - id: aroha_listen
    type: phrase_playback
    phrase: [Ni_mandra, Re, Ga, Ma_t, Pa, Dha, Ni, Sa_upper]
    instruction: |
      Listen to Yaman climbing. It begins below Sa, from Ni.
      That's unusual. It tells you something about this raga.
    repeat: 2
    show_labels: false

  - id: aroha_show
    type: phrase_playback
    phrase: [Ni_mandra, Re, Ga, Ma_t, Pa, Dha, Ni, Sa_upper]
    instruction: |
      Ni Re Ga Ma Pa Dha Ni Sa.
      Seven notes. All shuddha except one.
    repeat: 1
    show_labels: true

  # 4. HEAR THE AVAROHA — Sa' Ni Dha Pa Ma(t) Ga Re Sa
  - id: avaroha_listen
    type: phrase_playback
    phrase: [Sa_upper, Ni, Dha, Pa, Ma_t, Ga, Re, Sa]
    instruction: |
      And descending. Listen to the fourth note from the top.
      It has a different quality.
    repeat: 2
    show_labels: false

  - id: avaroha_show
    type: phrase_playback
    phrase: [Sa_upper, Ni, Dha, Pa, Ma_t, Ga, Re, Sa]
    repeat: 1
    show_labels: true

  # 5. MEET THE TIVRA MA — the defining swara
  - id: meet_ma_tivra
    type: swara_introduction
    instruction: |
      That different note is called tivra Ma.
      It is the only raised note in Yaman.
      It lifts every phrase upward. Listen.
    swaras: [Ma, Ma_t]
    presentation: comparison    # play shuddha Ma then tivra Ma
    audio_first: true

  # 6. INTRODUCTION — all seven swaras, one at a time
  - id: meet_yaman
    type: swara_introduction
    instruction: |
      Yaman uses seven swaras. Six are natural. One is raised.
      Listen to each one.
    swaras: [Sa, Re, Ga, Ma_t, Pa, Dha, Ni]
    presentation: sequential
    audio_first: true

  # 7. SING SA
  - id: sing_sa
    type: pitch_exercise
    target_swara: Sa
    duration_s: 15
    instruction: |
      Sing Sa. The anchor, as always.
    feedback_layer: minimal
    level_tolerance: shishya

  # 8. SING THE AROHA — guided
  - id: sing_aroha
    type: phrase_exercise
    phrase: [Sa, Re, Ga, Ma_t, Pa, Dha]
    instruction: |
      Follow the guide tone up through Yaman.
      When you reach the fourth note — tivra Ma — notice how it pulls upward.
    guide_tone: true
    feedback_layer: standard

  # 9. HEAR PAKAD PHRASES
  - id: pakad_listen
    type: phrase_playback
    phrase: [Ni_mandra, Re, Ga]
    instruction: |
      This is Yaman's signature opening. Ni Re Ga.
      It starts below Sa and rises. Listen three times.
    repeat: 3
    show_labels: false

  - id: pakad_listen_2
    type: phrase_playback
    phrase: [Ga, Ma_t, Re, Sa]
    instruction: |
      And this phrase turns back down through tivra Ma.
      Ga Ma Re Sa. Listen.
    repeat: 2
    show_labels: false

  # 10. PAKAD WATCH — primed free singing (set-up, not lottery)
  - id: pakad_watch
    type: passive_phrase_recognition
    enabled: true
    instruction: |
      Now sing freely. Use the notes of Yaman.
      The tanpura is with you. Take your time.
    duration_s: 60
    watch_for_pakad: true
    prime_pakad:
      raga_id: yaman
      phrase: [Ni, Re, Ga, Ma_t, Ga, Re, Sa]  # Yaman's characteristic pakad
      window_s: 45
    pakad_reward:
      xp_bonus: 10
      ceremony: gsap_pakad_moment

  # 11. COMPLETION
  - id: complete
    type: session_summary
    show_accuracy: true
    show_streak: true
    message: |
      You've met Yaman.
      In the evening, when the world grows quiet and lamps are lit —
      this raga lives there.

# --- ENGINE PARAMETERS --------------------------------------------

engine:
  raga_grammar_active: true
  pakad_recognition: true
  ornaments_shown: false       # Shishya: no ornament hints yet
  cents_display: hidden
  accuracy_model: shishya

# --- UNLOCK CONDITION ---------------------------------------------

unlock_next:
  lesson_id: beginner-04-bhairav
  requires:
    min_sessions: 1
    min_accuracy: 0.60
