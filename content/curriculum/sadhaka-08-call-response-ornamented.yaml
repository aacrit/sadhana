# Lesson S-08: Call & Response — Ornamented Phrases
# Journey: Explorer | Level: Sadhaka (4-6)
# Presence Rule: you hear before you name.
# Uses all learned ragas. Engine plays ornamented phrases.
# Uses call_response phase type (existing) with ornament detection.

id: sadhaka-08-call-response-ornamented
journey: explorer
level_range: [4, 6]
raga_id: null
duration_target_min: 12
xp_award: 45

meta:
  title: "Call & Response"
  subtitle: "Ornamented Phrases"
  time_of_day: null
  rasa: null

phases:

  - id: listen
    type: tanpura_drone
    duration_s: 20
    instruction: |
      Close your eyes. Listen.
      The tanpura is with you.
      Today the engine sings. You answer.
      Not just the notes — the ornaments too.
    tanpura:
      strings: [Pa, Sa, Sa, Sa_upper]
      sa_hz: null

  - id: sa_calibration
    type: sa_detection
    skip_if: sa_already_set
    instruction: |
      Confirm your Sa.
    attempts: 5
    min_clarity: 0.85
    fallback_hz: 261.6256

  # ROUND 1: Bhairav — phrase with andolan on Re_k
  - id: call_bhairav
    type: call_response
    instruction: |
      Bhairav. Listen to this phrase, then sing it back.
      Pay attention to the ornament.
    raga: bhairav
    call_phrase: [Sa, Re_k, Ga, Re_k, Sa]
    ornaments:
      Re_k: andolan
    call_repeats: 2
    response_duration_s: 15
    evaluation:
      pitch_accuracy: true
      ornament_presence: true
      ornament_type_expected: andolan
      ornament_on_swara: Re_k
    level_tolerance: sadhaka
    feedback_layer: standard

  # ROUND 2: Yaman — phrase with meend from Ga to Re
  - id: call_yaman
    type: call_response
    instruction: |
      Yaman. Listen and sing back. Hear the glide.
    raga: yaman
    call_phrase: [Ni_mandra, Re, Ga, Re, Sa]
    ornaments:
      Ga_to_Re: meend
    call_repeats: 2
    response_duration_s: 15
    evaluation:
      pitch_accuracy: true
      ornament_presence: true
      ornament_type_expected: meend
      ornament_between: [Ga, Re]
    level_tolerance: sadhaka
    feedback_layer: standard

  # ROUND 3: Bhimpalasi — phrase with gamak on Ma
  - id: call_bhimpalasi
    type: call_response
    instruction: |
      Bhimpalasi. The vadi swara shakes.
    raga: bhimpalasi
    call_phrase: [Ni_k_mandra, Sa, Ga_k, Ma, Pa]
    ornaments:
      Ma: gamak
    call_repeats: 2
    response_duration_s: 15
    evaluation:
      pitch_accuracy: true
      ornament_presence: true
      ornament_type_expected: gamak
      ornament_on_swara: Ma
    level_tolerance: sadhaka
    feedback_layer: standard

  # ROUND 4: Desh — phrase with mixed Ni
  - id: call_desh
    type: call_response
    instruction: |
      Desh. Listen for which Ni is used.
    raga: desh
    call_phrase: [Pa, Ma, Ga, Re, Sa]
    ornaments: {}
    call_repeats: 2
    response_duration_s: 15
    evaluation:
      pitch_accuracy: true
      ornament_presence: false
    level_tolerance: sadhaka
    feedback_layer: standard

  # ROUND 5: Bhairav — longer phrase with andolan and meend
  - id: call_bhairav_long
    type: call_response
    instruction: |
      A longer phrase. Bhairav. Both ornaments.
    raga: bhairav
    call_phrase: [Ma, Pa, Dha_k, Pa, Ma, Ga, Re_k, Sa]
    ornaments:
      Dha_k: andolan
      Ga_to_Re_k: meend
    call_repeats: 2
    response_duration_s: 20
    evaluation:
      pitch_accuracy: true
      ornament_presence: true
    level_tolerance: sadhaka
    feedback_layer: standard

  # ROUND 6: Bageshri — circling phrase
  - id: call_bageshri
    type: call_response
    instruction: |
      Bageshri. The circling phrase. Midnight.
    raga: bageshri
    call_phrase: [Sa, Ma, Ga_k, Ma, Dha, Ma, Ga_k, Re, Sa]
    ornaments: {}
    call_repeats: 2
    response_duration_s: 20
    evaluation:
      pitch_accuracy: true
      ornament_presence: false
    level_tolerance: sadhaka
    feedback_layer: standard

  - id: complete
    type: session_summary
    show_accuracy: true
    show_streak: true
    show_ornament_score: true
    message: |
      Call and response. The guru sings. The shishya answers.
      Not just the notes — the life within them.
      Ornaments are not optional. They are the raga speaking.

engine:
  raga_grammar_active: true
  pakad_recognition: false
  ornaments_shown: true
  ornament_detection: [meend, andolan, gamak]
  cents_display: on_tap
  accuracy_model: sadhaka

unlock_next:
  lesson_id: sadhaka-09-intervals
  requires:
    min_sessions: 1
    min_accuracy: 0.60
