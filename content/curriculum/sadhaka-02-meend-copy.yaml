lesson_id: sadhaka-02-meend

# --- PHASE COPY ----------------------------------------------------

phases:

  listen:
    screen_title: "Listen"
    body: |
      Close your eyes.
      The tanpura is playing. Today you learn to glide.
    audio_label: null

  sa_calibration:
    screen_title: "Find Your Sa"
    body: |
      Confirm your Sa. Hold it steady.
    prompt: "Sing or hum a comfortable note."
    calibrating_message: "Listening..."
    success_message: "That's your Sa."

  meend_listen_sa_re:
    screen_title: "Hear the Glide"
    body: |
      Sa slides to Re. One continuous motion.
      The space between is not empty.

  meend_listen_sa_ga:
    screen_title: "Wider"
    body: |
      Sa to Ga. The glide takes longer.
      More space to travel through.

  meend_listen_sa_pa:
    screen_title: "The Full Span"
    body: |
      Sa to Pa. Every frequency between them is touched.

  practice_meend_sa_re:
    screen_title: "Sing the Glide"
    body: |
      Sa to Re. Slide, do not step.
    feedback:
      smooth: "Smooth."
      stepped: "There is a step in the glide. Try to make it continuous."
      arrival_sharp: "You arrived a little high. Settle onto Re."
      arrival_flat: "A little low. Glide up to Re."
      too_fast: "Slow down. Let the voice travel."
      silence: "Whenever you're ready."

  practice_meend_sa_ga:
    screen_title: "Sa to Ga"
    body: |
      Wider interval. Take your time.
    feedback:
      smooth: "Smooth."
      stepped: "Steps in the glide. Try again — one motion."
      too_fast: "Slow down."

  practice_meend_sa_pa:
    screen_title: "Sa to Pa"
    body: |
      The full span. Let the voice travel.
    feedback:
      smooth: "Smooth."
      stepped: "There are steps. Let the voice slide continuously."
      too_fast: "Take more time."

  practice_meend_pa_ga:
    screen_title: "Descending Glide"
    body: |
      Pa to Ga. Descending meend.
      You heard this in Desh.
    feedback:
      smooth: "Smooth descent."
      stepped: "Steps detected. One continuous motion."

  free_meend:
    screen_title: "Free Practice"
    body: |
      Sing in Bhoopali. Connect the notes with glides.
      Let the tanpura hold you.

  complete:
    screen_title: "Session Complete"
    xp_line: "+40 XP"
    streak_line: null
    ornament_summary: "Meend smoothness: {meend_score}%"

# --- THEORY NOTE ---------------------------------------------------

theory_note:
  title: "Meend — The Glide"
  body: |
    Meend is the continuous glide between two swaras. It is the defining
    ornament of Hindustani vocal music — the quality that distinguishes
    a trained voice from a mechanical one. In meend, every frequency
    between the starting and ending swara is touched. The voice does not
    step from one note to the next but travels through the space between
    them. Meend is introduced first because it is the slowest ornament
    (easiest to control) and because it reveals the microtonal landscape
    between swaras. In the gurukul tradition, meend is the first
    ornament taught.

# --- WESTERN BRIDGE ------------------------------------------------

western_bridge:
  title: "Western Equivalent"
  body: |
    The closest Western equivalent is the portamento or glissando, but
    these are typically ornamental effects in Western music. In
    Hindustani music, meend is structural — certain phrases in certain
    ragas require meend to be considered correct. A phrase without its
    expected meend is like a sentence without its verb.

# --- CULTURAL NOTE -------------------------------------------------

cultural_note:
  title: "The Voice and the Instrument"
  body: |
    Meend is the reason the human voice is considered the supreme
    instrument in Hindustani music. A sitar or sarangi can approximate
    meend through string bending or bowing, but the voice produces
    it naturally. When you glide from one swara to another, you are
    doing what the voice was made to do.
