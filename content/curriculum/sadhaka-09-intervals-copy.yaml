lesson_id: sadhaka-09-intervals

# --- PHASE COPY ----------------------------------------------------

phases:

  listen:
    screen_title: "Listen"
    body: |
      Close your eyes.
      The tanpura is playing.
      Today you learn to hear the distance between swaras.

  sa_calibration:
    screen_title: "Find Your Sa"
    body: |
      Confirm your Sa.
    prompt: "Sing or hum a comfortable note."
    calibrating_message: "Listening..."
    success_message: "That's your Sa."

  hear_sa_pa:
    screen_title: "Sa — Pa"
    body: |
      The most consonant interval. The tanpura sings this constantly.

  hear_sa_ma:
    screen_title: "Sa — Ma"
    body: |
      The perfect fourth. Stable, warm.

  hear_sa_ga:
    screen_title: "Sa — Ga"
    body: |
      Shuddha Ga. Bright, open.

  hear_sa_re:
    screen_title: "Sa — Re"
    body: |
      A whole step. Small but clear.

  hear_sa_re_k:
    screen_title: "Sa — Re Komal"
    body: |
      A half step. Tense. Close. Bhairav's opening.

  hear_sa_ga_k:
    screen_title: "Sa — Ga Komal"
    body: |
      The minor third. Tender, dark.

  round_easy:
    screen_title: "Name the Interval"
    body: |
      Three possibilities. Sa-Pa, Sa-Ma, or Sa-Ga.
    feedback:
      correct: "Correct."
      incorrect: "Listen again. The distance tells you."
    choices: ["Sa-Pa", "Sa-Ma", "Sa-Ga"]

  round_medium:
    screen_title: "Name the Interval"
    body: |
      Five possibilities now.
    feedback:
      correct: "Correct."
      incorrect: "Not quite. Listen for the quality — bright, dark, tense, open."
    choices: ["Sa-Pa", "Sa-Ma", "Sa-Ga", "Sa-Re", "Sa-Ga komal"]

  round_hard:
    screen_title: "Name the Interval"
    body: |
      All six intervals. Including Re komal.
    feedback:
      correct: "Correct."
      incorrect: "Listen again. Each interval has a distinct quality."
    choices: ["Sa-Pa", "Sa-Ma", "Sa-Ga", "Sa-Re", "Sa-Re komal", "Sa-Ga komal"]

  sing_intervals:
    screen_title: "Sing the Distances"
    body: |
      Sa then Pa. Then Sa then Ma. Feel each distance.
    feedback:
      correct: "Correct interval."
      wrong_swara: "Listen to the guide tone."

  complete:
    screen_title: "Session Complete"
    xp_line: "+40 XP"
    streak_line: null

# --- THEORY NOTE ---------------------------------------------------

theory_note:
  title: "Intervals in Hindustani Music"
  body: |
    In Hindustani music, intervals are not named with abstract labels
    like "perfect fifth" or "minor third." They are described by the
    swaras involved: Sa-Pa, Sa-Ma, Sa-Ga. Each interval has a quality
    that is inseparable from its swara context. Sa-Pa is the most
    consonant interval after the octave (3:2 ratio). Sa-Re_k is the
    most tense (16:15 ratio). Sa-Ga_k carries the tenderness that
    defines ragas like Bhimpalasi. Interval recognition is the
    foundation of raga recognition — when you can hear the interval,
    you can hear the raga.

# --- WESTERN BRIDGE ------------------------------------------------

western_bridge:
  title: "Western Equivalent"
  body: |
    Western ear training uses interval labels: perfect fifth, major
    third, minor second. Hindustani interval awareness is swara-based:
    Sa-Pa, Sa-Ga, Sa-Re_k. The advantage of the swara-based approach
    is that it connects directly to raga context — "Sa-Re_k" immediately
    evokes Bhairav, while "minor second" does not. The disadvantage
    is that it requires knowing the swaras. Both systems ultimately
    train the same skill: hearing the distance between two pitches.

# --- CULTURAL NOTE -------------------------------------------------

cultural_note:
  title: "The Ear of the Musician"
  body: |
    A trained Hindustani musician does not consciously "identify"
    intervals. They hear Sa-Pa as a quality, not a measurement.
    The recognition is instant and embodied, like recognising a
    face. This lesson begins that process. Over time, each interval
    will carry not just a frequency relationship but an emotional
    association: Sa-Pa is home. Sa-Re_k is Bhairav. Sa-Ga_k is
    tenderness. The ear learns what the mind cannot teach.
