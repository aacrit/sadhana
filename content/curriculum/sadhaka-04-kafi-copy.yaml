# --- THEORY NOTE ---------------------------------------------------

theory_note:
  title: "Raga Kafi and the Thaat System"
  body: |
    Kafi is both a raga and a thaat (parent scale). The Kafi thaat
    uses komal Ga and komal Ni with all other swaras shuddha. Three
    ragas you know — Bhimpalasi, Bageshri, and Kafi — share this
    swara set but sound entirely different because of their aroha/
    avaroha movement, vadi emphasis, and characteristic phrases.
    The thaat system, codified by Bhatkhande, organises ragas into
    ten parent scales. Kafi is one of the ten. Understanding thaats
    helps you see relationships between ragas.

# --- WESTERN BRIDGE ------------------------------------------------

western_bridge:
  title: "Western Equivalent"
  body: |
    The Kafi thaat roughly corresponds to the Dorian mode (D to D
    on white keys), but the comparison is structural only. Western
    modes are defined by interval patterns. Ragas within a thaat
    are defined by movement, emphasis, and phrase grammar. Three
    ragas can share a thaat and sound nothing alike — something
    that has no parallel in Western modal theory.

# --- CULTURAL NOTE -------------------------------------------------

cultural_note:
  title: "Kafi and Holi"
  body: |
    Kafi is traditionally associated with the spring festival of
    Holi — a time of colour, celebration, and abandon. Its light,
    direct character suits the festive mood. The thumri and dadra
    forms (lighter classical genres) frequently use Kafi as their
    foundation. Where Bhimpalasi is tender and Bageshri is achingly
    romantic, Kafi is open, generous, and direct.
