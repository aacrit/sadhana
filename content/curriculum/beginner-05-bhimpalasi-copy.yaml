# --- THEORY NOTE ---------------------------------------------------

theory_note:
  title: "Raga Bhimpalasi"
  body: |
    Bhimpalasi is an audava-sampoorna raga of the Kafi thaat. Its ascent
    uses five swaras (Ni Sa Ga Ma Pa Ni Sa -- omitting Re and Dha), while
    its descent uses all seven (Sa Ni Dha Pa Ma Ga Re Sa). This asymmetry
    is the raga's structural genius: ascending in broad strokes, descending
    with detailed expression. The komal Ga gives emotional depth; the komal
    Ni adds yearning. Ma is the vadi -- the emotional centre around which
    all phrases orbit. The samvadi is Sa. Bhimpalasi's rasa is karuna
    (pathos) and shringar (devotion). It belongs to the late afternoon,
    the 3rd and 4th prahar.

# --- WESTERN BRIDGE ------------------------------------------------

western_bridge:
  title: "Western Equivalent"
  body: |
    Western listeners may sense something akin to a Dorian or natural
    minor quality from the komal Ga and komal Ni, but Bhimpalasi's
    identity lies in its vakra (oblique) movement and the emotional
    centrality of Ma -- characteristics without a Western parallel.
    The concept of a scale that uses different notes ascending and
    descending has no standard equivalent in Western theory.

# --- CULTURAL NOTE -------------------------------------------------

cultural_note:
  title: "Afternoon Light"
  body: |
    Bhimpalasi belongs to the late afternoon -- the sun past its zenith,
    shadows lengthening, the day's intensity beginning to yield. In the
    Hindustani tradition, this is the hour of devotion and tenderness.
    The raga's emotional quality -- karuna, a compassionate pathos --
    aligns with the softening quality of afternoon light. Bhimpalasi
    is related to Bageshri (a night raga) through their shared thaat
    and komal swaras, but where Bageshri aches with separation,
    Bhimpalasi glows with quiet warmth.
