  meet_komal_ga:
    screen_title: "Komal Ga"
    body: |
      The lowered third. It gives Bhimpalasi its tenderness.
      First, hear the natural Ga. Then komal Ga.

  meet_komal_ni:
    screen_title: "Komal Ni"
    body: |
      The lowered seventh. It adds yearning.
      First, hear the natural Ni. Then komal Ni.

  asymmetry:
    screen_title: "The Ascent"
    body: |
      Five notes going up. Broad strokes.

  asymmetry_down:
    screen_title: "The Descent"
    body: |
      Seven notes coming down. Step by step.
      The climb is spare. The descent tells the story.

  meet_bhimpalasi:
    screen_title: "Five Notes"
    body: |
      The ascending swaras of Bhimpalasi. Listen to each one.
