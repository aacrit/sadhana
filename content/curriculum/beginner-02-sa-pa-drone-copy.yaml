lesson_id: beginner-02-sa-pa-drone

# --- PHASE COPY ----------------------------------------------------

phases:

  listen:
    screen_title: "Listen"
    body: |
      Close your eyes.
      The tanpura is playing. One of its strings sounds different.
      Just notice.
    audio_label: null

  sa_calibration:
    screen_title: "Find Your Sa"
    body: |
      Sa is the home note. Everything starts and returns here.
      Hum or sing a comfortable pitch. Hold it steady.
    prompt: "Sing or hum a comfortable note."
    calibrating_message: "Listening..."
    success_message: "That's your Sa."

  hear_sa:
    screen_title: "Sa"
    body: |
      This is the anchor. Everything begins here.

  hear_pa:
    screen_title: "A New Note"
    body: |
      Higher than Sa, but related. They belong together.

  hear_sa_pa:
    screen_title: "The Distance"
    body: |
      Sa, then Pa. Listen to the space between them.

  hear_sa_pa_labeled:
    body: |
      Sa and Pa. The first harmony.

  sing_sa:
    screen_title: "Sing Sa"
    body: |
      Let your voice settle into the drone.
    feedback:
      correct: "That's Sa."
      sharp: "A little high. Settle down into the tanpura."
      flat: "A little low. Let your voice rise to meet the drone."
      silence: "Whenever you're ready."

  sing_pa:
    screen_title: "Sing Pa"
    body: |
      Pa sits above Sa. Let the tanpura guide you to it.
    feedback:
      correct: "That's Pa."
      sharp: "A little high."
      flat: "A little low. Listen to the Pa string in the tanpura."
      silence: "Whenever you're ready."

  call_response_sa:
    screen_title: "Call and Response"
    body: |
      I play a note. You sing it back.
    feedback:
      correct: "Correct."
      wrong_swara: "Listen again."

  call_response_complement:
    screen_title: "The Complement"
    body: |
      Now the opposite. I play Sa, you sing Pa.
      I play Pa, you sing Sa.
    feedback:
      correct: "Correct."
      wrong_swara: "The other one."

  free_sing:
    screen_title: "Free Singing"
    body: |
      Move between Sa and Pa. Back and forth.
      No rush. Let each note ring.
    feedback:
      correct: "Good."
      wrong_swara: "Stay on Sa or Pa."

  complete:
    screen_title: "Session Complete"
    xp_line: "+25 XP"
    streak_line: "Day 2"

# --- THEORY NOTE ---------------------------------------------------

theory_note:
  title: "Sa and Pa"
  body: |
    Pa is the fifth degree of the scale. Its frequency ratio to Sa is
    3:2 -- three vibrations of Pa for every two of Sa. This is the
    simplest and most consonant interval after the octave. The tanpura
    drone is built on this relationship: one Pa string, three Sa strings.
    When Sa and Pa sound together, they reinforce each other's overtones.
    This is why the tanpura sounds so full with so few notes.

# --- WESTERN BRIDGE ------------------------------------------------

western_bridge:
  title: "Western Equivalent"
  body: |
    The Sa-Pa interval is the perfect fifth in Western music theory.
    It is the foundation of harmony across virtually all musical
    traditions. In Hindustani music, Pa is the samvadi (consonant
    partner) to Sa -- a relationship of mathematical and acoustic
    inevitability.

# --- CULTURAL NOTE -------------------------------------------------

cultural_note:
  title: "The Tanpura Drone"
  body: |
    The tanpura is not accompaniment. It is the ground. Every note
    a musician sings exists in relationship to the tanpura's Sa and Pa.
    The drone does not change -- the musician's voice moves around it,
    sometimes aligning perfectly, sometimes pulling away, always
    returning. This is the foundation of all Hindustani music.
