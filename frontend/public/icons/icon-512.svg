<?xml version="1.0" encoding="UTF-8"?>
<!--
  Sadhana PWA Icon -- 512x512
  Text-dominant brand mark: "Sadhana" wordmark in Cormorant Garamond
  commands the space. Devanagari as equal partner beneath. Tantri string
  accent band with standing wave and saffron Sa terminus.
  Maximum detail at this size: full wave articulation, enhanced glow.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="sa-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8871E" stop-opacity="0.50"/>
      <stop offset="50%" stop-color="#E8871E" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#E8871E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="string-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-opacity="1"/>
      <stop offset="72%" stop-opacity="1"/>
      <stop offset="100%" stop-opacity="0"/>
    </linearGradient>
    <mask id="fade-mask">
      <rect x="44" y="0" width="440" height="512" fill="url(#string-fade)"/>
    </mask>
    <filter id="wave-glow" x="-20%" y="-200%" width="140%" height="500%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: Deep Malachite -->
  <rect width="512" height="512" rx="64" fill="#0A1A14"/>

  <!-- Primary wordmark: "Sadhana" -- large, commanding, the hero -->
  <text x="256" y="210" font-family="'Cormorant Garamond', Georgia, serif"
        font-size="108" font-weight="400" letter-spacing="0.08em"
        fill="#F0E6D3" text-anchor="middle">
    S&#x101;dhan&#x101;
  </text>

  <!-- Saffron accent dot beside the S -->
  <circle cx="82" cy="216" r="4.5" fill="#E8871E" opacity="0.55"/>

  <!-- Devanagari -- treated as equal partner, not subtitle -->
  <text x="256" y="268" font-family="'Noto Serif Devanagari', serif"
        font-size="42" font-weight="400" letter-spacing="0.12em"
        fill="#B8A99A" text-anchor="middle" opacity="0.75">&#x0938;&#x093E;&#x0927;&#x0928;&#x093E;</text>

  <!-- Tantri string accent band -->
  <g mask="url(#fade-mask)">
    <!-- Dha -->
    <line x1="44" y1="316" x2="468" y2="316"
          stroke="#F0E6D3" stroke-width="2.5" stroke-linecap="round" opacity="0.20"/>
    <!-- Pa -->
    <line x1="44" y1="334" x2="468" y2="334"
          stroke="#B8A99A" stroke-width="4.5" stroke-linecap="round" opacity="0.35"/>
    <!-- Ga -->
    <line x1="44" y1="360" x2="468" y2="360"
          stroke="#F0E6D3" stroke-width="2.5" stroke-linecap="round" opacity="0.20"/>
    <!-- Re -->
    <line x1="44" y1="382" x2="468" y2="382"
          stroke="#F0E6D3" stroke-width="2.5" stroke-linecap="round" opacity="0.20"/>

    <!-- Sa string: standing wave (fundamental mode) -->
    <!-- Saffron glow behind wave -->
    <path d="M 44.00 416.00 L 52.83 415.02 L 61.67 414.06 L 70.50 413.14 L 79.33 412.26 L 88.17 411.43 L 97.00 410.66 L 105.83 409.95 L 114.67 409.31 L 123.50 408.74 L 132.33 408.25 L 141.17 407.83 L 150.00 407.50 L 158.83 407.26 L 167.67 407.10 L 176.50 407.03 L 185.33 407.05 L 194.17 407.16 L 203.00 407.35 L 211.83 407.63 L 220.67 407.99 L 229.50 408.43 L 238.33 408.95 L 247.17 409.54 L 256.00 410.20 L 264.83 410.92 L 273.67 411.70 L 282.50 412.53 L 291.33 413.41 L 300.17 414.32 L 309.00 415.26 L 317.83 416.21 L 326.67 417.17 L 335.50 418.12 L 344.33 419.05 L 353.17 419.95 L 362.00 420.80 L 370.83 421.60 L 379.67 422.33 L 388.50 422.98 L 397.33 423.54 L 406.17 424.00 L 415.00 424.36 L 423.83 424.60 L 432.67 424.73 L 441.50 424.74 L 450.33 424.63 L 459.17 424.40 L 468.00 424.06"
          stroke="#E8871E" stroke-width="12" stroke-linecap="round" fill="none"
          opacity="0.12" filter="url(#wave-glow)"/>
    <!-- Main Sa wave -->
    <path d="M 44.00 416.00 L 52.83 415.02 L 61.67 414.06 L 70.50 413.14 L 79.33 412.26 L 88.17 411.43 L 97.00 410.66 L 105.83 409.95 L 114.67 409.31 L 123.50 408.74 L 132.33 408.25 L 141.17 407.83 L 150.00 407.50 L 158.83 407.26 L 167.67 407.10 L 176.50 407.03 L 185.33 407.05 L 194.17 407.16 L 203.00 407.35 L 211.83 407.63 L 220.67 407.99 L 229.50 408.43 L 238.33 408.95 L 247.17 409.54 L 256.00 410.20 L 264.83 410.92 L 273.67 411.70 L 282.50 412.53 L 291.33 413.41 L 300.17 414.32 L 309.00 415.26 L 317.83 416.21 L 326.67 417.17 L 335.50 418.12 L 344.33 419.05 L 353.17 419.95 L 362.00 420.80 L 370.83 421.60 L 379.67 422.33 L 388.50 422.98 L 397.33 423.54 L 406.17 424.00 L 415.00 424.36 L 423.83 424.60 L 432.67 424.73 L 441.50 424.74 L 450.33 424.63 L 459.17 424.40 L 468.00 424.06"
          stroke="#F0E6D3" stroke-width="7" stroke-linecap="round" fill="none"
          opacity="0.70"/>
  </g>

  <!-- Sa terminus glow halo -->
  <circle cx="44" cy="416" r="30" fill="url(#sa-glow)"/>

  <!-- Solid saffron Sa terminus point -->
  <circle cx="44" cy="416" r="10" fill="#E8871E"/>

  <!-- Pa terminus point -->
  <circle cx="44" cy="334" r="4" fill="#B8A99A" opacity="0.5"/>
</svg>
