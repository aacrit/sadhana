<?xml version="1.0" encoding="UTF-8"?>
<!--
  Sadhana PWA Icon -- 192x192
  Text-dominant brand mark: "Sadhana" wordmark in Cormorant Garamond
  commands the space. Devanagari as equal partner. Tantri string
  accent band with standing wave beneath.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <radialGradient id="sa-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8871E" stop-opacity="0.50"/>
      <stop offset="55%" stop-color="#E8871E" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#E8871E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="string-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-opacity="1"/>
      <stop offset="72%" stop-opacity="1"/>
      <stop offset="100%" stop-opacity="0"/>
    </linearGradient>
    <mask id="fade-mask">
      <rect x="16" y="0" width="168" height="192" fill="url(#string-fade)"/>
    </mask>
    <filter id="wave-glow" x="-20%" y="-200%" width="140%" height="500%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: Deep Malachite -->
  <rect width="192" height="192" rx="24" fill="#0A1A14"/>

  <!-- Primary wordmark: "Sadhana" -- large, commanding -->
  <text x="96" y="78" font-family="'Cormorant Garamond', Georgia, serif"
        font-size="42" font-weight="400" letter-spacing="0.08em"
        fill="#F0E6D3" text-anchor="middle">
    S&#x101;dhan&#x101;
  </text>

  <!-- Saffron accent dot -->
  <circle cx="35" cy="82" r="2" fill="#E8871E" opacity="0.5"/>

  <!-- Devanagari -- equal partner -->
  <text x="96" y="104" font-family="'Noto Serif Devanagari', serif"
        font-size="18" font-weight="400" letter-spacing="0.12em"
        fill="#B8A99A" text-anchor="middle" opacity="0.75">&#x0938;&#x093E;&#x0927;&#x0928;&#x093E;</text>

  <!-- Tantri string accent band (below text) -->
  <g mask="url(#fade-mask)">
    <!-- Dha -->
    <line x1="16" y1="124" x2="176" y2="124"
          stroke="#F0E6D3" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
    <!-- Pa -->
    <line x1="16" y1="130" x2="176" y2="130"
          stroke="#B8A99A" stroke-width="2" stroke-linecap="round" opacity="0.40"/>
    <!-- Ga -->
    <line x1="16" y1="139" x2="176" y2="139"
          stroke="#F0E6D3" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
    <!-- Re -->
    <line x1="16" y1="146" x2="176" y2="146"
          stroke="#F0E6D3" stroke-width="1" stroke-linecap="round" opacity="0.25"/>

    <!-- Sa string: standing wave -->
    <!-- Saffron glow -->
    <path d="M 16 160 Q 48 153, 96 160 Q 144 167, 176 160"
          stroke="#E8871E" stroke-width="4.5" stroke-linecap="round" fill="none"
          opacity="0.12" filter="url(#wave-glow)"/>
    <!-- Main Sa wave -->
    <path d="M 16 160 Q 48 153, 96 160 Q 144 167, 176 160"
          stroke="#F0E6D3" stroke-width="2.5" stroke-linecap="round" fill="none"
          opacity="0.70"/>
  </g>

  <!-- Sa terminus glow halo -->
  <circle cx="16" cy="160" r="10" fill="url(#sa-glow)"/>

  <!-- Solid saffron Sa terminus point -->
  <circle cx="16" cy="160" r="4" fill="#E8871E"/>

  <!-- Pa terminus point -->
  <circle cx="16" cy="130" r="1.5" fill="#B8A99A" opacity="0.5"/>
</svg>
