<?xml version="1.0" encoding="UTF-8"?>
<!--
  Sadhana PWA Icon — 192x192
  Tantri Resonance Mark: Five horizontal strings at just-intonation
  intervals (Bhoopali pentatonic: Sa Re Ga Pa Dha). Sa string carries
  a standing wave (fundamental mode). Saffron Sa terminus point with
  glow halo. Strings fade rightward. Background: Deep Malachite.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <!-- Sa terminus glow: radial saffron halo -->
    <radialGradient id="sa-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8871E" stop-opacity="0.50"/>
      <stop offset="55%" stop-color="#E8871E" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#E8871E" stop-opacity="0"/>
    </radialGradient>
    <!-- Rightward fade: strings dissolve into malachite -->
    <linearGradient id="string-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-opacity="1"/>
      <stop offset="72%" stop-opacity="1"/>
      <stop offset="100%" stop-opacity="0"/>
    </linearGradient>
    <mask id="fade-mask">
      <rect x="36" y="0" width="150" height="192" fill="url(#string-fade)"/>
    </mask>
    <!-- Wave glow blur -->
    <filter id="wave-glow" x="-20%" y="-200%" width="140%" height="500%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: Deep Malachite -->
  <rect width="192" height="192" rx="24" fill="#0A1A14"/>

  <!--
    String field (safe area ~80%):
    fieldLeft=36, fieldRight=186, fieldLength=150
    fieldTop=30, fieldBottom=162, fieldHeight=132

    Bhoopali Y positions (log2-normalized, Sa at bottom, Dha at top):
      Dha:  30.0
      Pa:   57.2
      Ga:  104.3
      Re:  131.6
      Sa:  162.0
  -->

  <g mask="url(#fade-mask)">
    <!-- Dha string (highest, thinnest) -->
    <line x1="36" y1="30" x2="186" y2="30"
          stroke="#F0E6D3" stroke-width="3" stroke-linecap="round" opacity="0.40"/>

    <!-- Pa string (fifth degree, slightly thicker) -->
    <line x1="36" y1="57.2" x2="186" y2="57.2"
          stroke="#B8A99A" stroke-width="5.4" stroke-linecap="round" opacity="0.65"/>

    <!-- Ga string -->
    <line x1="36" y1="104.3" x2="186" y2="104.3"
          stroke="#F0E6D3" stroke-width="3" stroke-linecap="round" opacity="0.45"/>

    <!-- Re string -->
    <line x1="36" y1="131.6" x2="186" y2="131.6"
          stroke="#F0E6D3" stroke-width="3" stroke-linecap="round" opacity="0.45"/>

    <!-- Sa string: standing wave (fundamental mode, sin(pi*t) * 8.6px) -->
    <!-- Saffron glow behind wave -->
    <path d="M 36.00 162.00 L 39.13 161.44 L 42.25 160.88 L 45.38 160.32 L 48.50 159.77 L 51.63 159.24 L 54.75 158.71 L 57.88 158.20 L 61.00 157.70 L 64.13 157.22 L 67.25 156.76 L 70.38 156.33 L 73.50 155.92 L 76.63 155.53 L 79.75 155.18 L 82.88 154.85 L 86.00 154.55 L 89.13 154.29 L 92.25 154.05 L 95.38 153.86 L 98.50 153.69 L 101.63 153.57 L 104.75 153.47 L 107.88 153.42 L 111.00 153.40 L 114.13 153.42 L 117.25 153.47 L 120.38 153.57 L 123.50 153.69 L 126.63 153.86 L 129.75 154.05 L 132.88 154.29 L 136.00 154.55 L 139.13 154.85 L 142.25 155.18 L 145.38 155.53 L 148.50 155.92 L 151.63 156.33 L 154.75 156.76 L 157.88 157.22 L 161.00 157.70 L 164.13 158.20 L 167.25 158.71 L 170.38 159.24 L 173.50 159.77 L 176.63 160.32 L 179.75 160.88 L 182.88 161.44 L 186.00 162.00"
          stroke="#E8871E" stroke-width="10" stroke-linecap="round" fill="none"
          opacity="0.12" filter="url(#wave-glow)"/>
    <!-- Main Sa wave -->
    <path d="M 36.00 162.00 L 39.13 161.44 L 42.25 160.88 L 45.38 160.32 L 48.50 159.77 L 51.63 159.24 L 54.75 158.71 L 57.88 158.20 L 61.00 157.70 L 64.13 157.22 L 67.25 156.76 L 70.38 156.33 L 73.50 155.92 L 76.63 155.53 L 79.75 155.18 L 82.88 154.85 L 86.00 154.55 L 89.13 154.29 L 92.25 154.05 L 95.38 153.86 L 98.50 153.69 L 101.63 153.57 L 104.75 153.47 L 107.88 153.42 L 111.00 153.40 L 114.13 153.42 L 117.25 153.47 L 120.38 153.57 L 123.50 153.69 L 126.63 153.86 L 129.75 154.05 L 132.88 154.29 L 136.00 154.55 L 139.13 154.85 L 142.25 155.18 L 145.38 155.53 L 148.50 155.92 L 151.63 156.33 L 154.75 156.76 L 157.88 157.22 L 161.00 157.70 L 164.13 158.20 L 167.25 158.71 L 170.38 159.24 L 173.50 159.77 L 176.63 160.32 L 179.75 160.88 L 182.88 161.44 L 186.00 162.00"
          stroke="#F0E6D3" stroke-width="6.6" stroke-linecap="round" fill="none"
          opacity="0.85"/>
  </g>

  <!-- Sa terminus glow halo -->
  <circle cx="36" cy="162" r="22" fill="url(#sa-glow)"/>

  <!-- Solid saffron Sa terminus point -->
  <circle cx="36" cy="162" r="8.4" fill="#E8871E"/>

  <!-- Pa terminus point (subtle anchor) -->
  <circle cx="36" cy="57.2" r="4.5" fill="#B8A99A" opacity="0.6"/>
</svg>
