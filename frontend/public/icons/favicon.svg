<?xml version="1.0" encoding="UTF-8"?>
<!--
  Sadhana Favicon -- scalable SVG (16x16)
  Tantri Resonance Mark, compact: 3 strings (Sa, Pa, Dha).
  Sa point with saffron glow. Maximum legibility at small sizes.
  The compact mark for icon contexts where text cannot render.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <defs>
    <linearGradient id="f" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-opacity="1"/>
      <stop offset="65%" stop-opacity="1"/>
      <stop offset="100%" stop-opacity="0"/>
    </linearGradient>
    <mask id="m">
      <rect x="3" y="0" width="12.5" height="16" fill="url(#f)"/>
    </mask>
    <radialGradient id="sg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8871E" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E8871E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background: Deep Malachite -->
  <rect width="16" height="16" rx="3" fill="#0A1A14"/>

  <!-- Compact Bhoopali: 3 strings (Sa, Pa, Dha) -->
  <g mask="url(#m)">
    <!-- Dha string -->
    <line x1="3" y1="2.5" x2="15.5" y2="2.5"
          stroke="#F0E6D3" stroke-width="0.75" stroke-linecap="round" opacity="0.40"/>
    <!-- Pa string -->
    <line x1="3" y1="4.77" x2="15.5" y2="4.77"
          stroke="#B8A99A" stroke-width="1.2" stroke-linecap="round" opacity="0.65"/>
    <!-- Sa string -->
    <line x1="3" y1="13.5" x2="15.5" y2="13.5"
          stroke="#F0E6D3" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
  </g>

  <!-- Sa terminus glow halo -->
  <circle cx="3" cy="13.5" r="4" fill="url(#sg)"/>

  <!-- Solid saffron Sa terminus point -->
  <circle cx="3" cy="13.5" r="2" fill="#E8871E"/>
</svg>
