# --- PHASE COPY ----------------------------------------------------

phases:

  listen:
    screen_title: "Listen"
    body: |
      Close your eyes.
      The tanpura is playing. Afternoon.
      Today you learn the vigorous cousin of andolan.

  sa_calibration:
    screen_title: "Find Your Sa"
    body: |
      Confirm your Sa.
    prompt: "Sing or hum a comfortable note."
    calibrating_message: "Listening..."
    success_message: "That's your Sa."

  hear_andolan:
    screen_title: "Remember Andolan"
    body: |
      Gentle. 2-4 waves per second. A candle flame.

  hear_gamak:
    screen_title: "Gamak"
    body: |
      Faster. Wider. More energy. A shake.
      This is gamak.

  hear_gamak_ma:
    screen_title: "Gamak on Ma"
    body: |
      In Bhimpalasi, Ma shakes with gamak.
      The vadi swara vibrates with intensity.

  practice_gamak_ma:
    screen_title: "Sing with Gamak"
    body: |
      Ma with gamak. 4-8 waves per second.
      Vigorous, not violent.
    feedback:
      good_oscillation: "The gamak is there."
      too_slow: "Faster. Gamak is more vigorous than andolan."
      too_fast: "Slightly slower. Control the energy."
      too_narrow: "Wider. Gamak needs more amplitude than andolan."
      too_wide: "Narrower. Keep control."
      off_centre: "Centre on Ma."
      silence: "Whenever you're ready."

  practice_gamak_pa:
    screen_title: "Gamak on Pa"
    body: |
      Same vigorous shake on Pa.
    feedback:
      good_oscillation: "Good."
      too_slow: "Faster."
      too_narrow: "Wider."

  contrast_exercise:
    screen_title: "Andolan vs Gamak"
    body: |
      Andolan on Re komal. Then gamak on Ma.
      Feel the difference in energy.

  phrase_with_gamak:
    screen_title: "Bhimpalasi with Gamak"
    body: |
      Ni Sa Ga Ma Pa. Add gamak on Ma.
    feedback:
      correct: "The gamak is present."
      missing_ornament: "Ma needs gamak here. Shake it."
      wrong_swara: "Check the phrase."

  free_gamak:
    screen_title: "Free Singing"
    body: |
      Sing freely in Bhimpalasi.
      Gamak on Ma. Andolan where it belongs.
    pakad_found_headline: "Bhimpalasi"
    pakad_found_subtext: "Ni Sa Ga Ma"

  complete:
    screen_title: "Session Complete"
    xp_line: "+40 XP"
    streak_line: null
    ornament_summary: "Gamak quality: {gamak_score}%"

# --- THEORY NOTE ---------------------------------------------------

theory_note:
  title: "Gamak — The Vigorous Shake"
  body: |
    Gamak is a fast, wide oscillation around a target swara — 4-8 Hz
    with an amplitude of 50-150 cents. It is the vigorous counterpart
    to andolan's gentle wave. Where andolan is meditative, gamak is
    energetic. Where andolan belongs to the contemplative swaras of
    Bhairav, gamak belongs to the active swaras of ragas like
    Bhimpalasi. The three ornaments you now know — meend (linear
    glide), andolan (slow oscillation), gamak (fast oscillation) —
    form a progression from control to energy.

# --- WESTERN BRIDGE ------------------------------------------------

western_bridge:
  title: "Western Equivalent"
  body: |
    Gamak resembles an exaggerated vibrato, but in Western music,
    vibrato is usually narrow (10-30 cents) and constant. Gamak is
    wider (50-150 cents), faster, and applied selectively. A
    Western singer who applied gamak-width vibrato to every note
    would sound unstable. In Hindustani music, gamak on the right
    swara in the right raga sounds powerful and intentional.

# --- CULTURAL NOTE -------------------------------------------------

cultural_note:
  title: "Ornament and Identity"
  body: |
    You now know three ornaments: meend, andolan, gamak. Each belongs
    to specific swaras in specific ragas. Andolan on Re komal in
    Bhairav. Gamak on Ma in Bhimpalasi. Meend between any swaras
    but characteristic of certain descents. The ornament is not
    decoration — it is identity. Remove andolan from Bhairav's
    komal Re and the raga loses its character. Remove gamak from
    Bhimpalasi's Ma and the raga loses its energy.
