# --- PHASE COPY ----------------------------------------------------

phases:

  listen:
    screen_title: "Listen"
    body: |
      Close your eyes.
      The tanpura is playing. First light.
    audio_label: null

  sa_calibration:
    screen_title: "Find Your Sa"
    body: |
      Sa is the home note. Everything starts and returns here.
      Hum or sing a comfortable pitch. Hold it steady.
    prompt: "Sing or hum a comfortable note."
    calibrating_message: "Listening..."
    success_message: "That's your Sa."

  aroha_listen:
    screen_title: "Climbing Up"
    body: |
      Listen to Bhairav ascending. The second and sixth notes sit lower
      than you might expect. They pull downward.

  aroha_show:
    body: |
      Sa Re Ga Ma Pa Dha Ni Sa.
      Two notes are komal -- lowered.

  avaroha_listen:
    screen_title: "Coming Down"
    body: |
      Now descending. The komal notes become even more powerful
      on the way down.

  avaroha_show:
    body: |
      Sa Ni Dha Pa Ma Ga Re Sa.

  meet_komal_re:
    screen_title: "Komal Re"
    body: |
      The lowered second note. In Bhairav, it sits just above Sa,
      almost touching it. This closeness gives Bhairav its intensity.
      First, hear the natural Re. Then komal Re.

  meet_komal_dha:
    screen_title: "Komal Dha"
    body: |
      The lowered sixth. It mirrors komal Re in the upper half of
      the scale. Together they give Bhairav its gravity.
      At higher levels, you will learn andolan on this note --
      a gentle oscillation. For now, just hear it.

  meet_bhairav:
    screen_title: "Seven Notes"
    body: |
      Bhairav uses seven swaras. Listen to each one.
    swara_reveal_delay_ms: 1200

  sing_sa:
    screen_title: "Sing Sa"
    body: |
      Ground yourself.
    feedback:
      correct: "That's Sa."
      sharp: "A little high. Settle into the tanpura."
      flat: "A little low. Rise to meet the drone."
      silence: "Whenever you're ready."

  sing_opening:
    screen_title: "Sing the Opening"
    body: |
      Follow the guide tone. Sa, komal Re, Ga, komal Re, Sa.
      This is how Bhairav begins.
    feedback:
      correct: "Correct."
      wrong_swara: "Listen to the guide tone again."
      guide_tone_label: "Guide"

  pakad_listen:
    screen_title: "Bhairav's Signature"
    body: |
      Sa Re Ga Re Sa. The way it dwells on komal Re.
      That is Bhairav.

  pakad_listen_2:
    screen_title: "The Descent"
    body: |
      Ma Ga Re Sa. Feel the pull toward home.

  pakad_watch:
    screen_title: "Free Singing"
    body: |
      Sing freely in Bhairav. Use the notes you've heard.
      The tanpura is with you.
    pakad_found_headline: "Bhairav"
    pakad_found_subtext: "Sa Re Ga Re Sa"

  complete:
    screen_title: "Session Complete"
    xp_line: "+35 XP"
    streak_line: null

# --- THEORY NOTE ---------------------------------------------------

theory_note:
  title: "Raga Bhairav"
  body: |
    Bhairav is a sampoorna raga of the Bhairav thaat. Its defining
    feature is the pair of komal (lowered) swaras: Re and Dha. These
    two notes, placed symmetrically in the scale, create a gravitational
    pull that gives the raga its gravity and austerity. The vadi is
    komal Dha; the samvadi is komal Re. Both are traditionally sung
    with andolan -- a gentle, sustained oscillation that distinguishes
    Bhairav's komal Re from, say, Todi's. Bhairav's rasa is karuna
    (compassion, pathos) and shant (peace). It is the raga of dawn,
    the first prahar of the day.

# --- WESTERN BRIDGE ------------------------------------------------

western_bridge:
  title: "Western Equivalent"
  body: |
    Western listeners may hear echoes of the Phrygian mode in the
    lowered second degree, but Bhairav's identity is shaped by the
    andolan on Re and Dha -- microtonal oscillations with no Western
    equivalent -- and its association with the specific emotional
    quality of dawn.

# --- CULTURAL NOTE -------------------------------------------------

cultural_note:
  title: "Named for Shiva"
  body: |
    Bhairav is named after Lord Shiva in his fierce, meditative
    aspect. It is one of the six principal ragas in the ancient
    raga-ragini classification system. The tradition of singing
    Bhairav at dawn is not mere convention -- musicians hold that
    the raga's gravity aligns with the stillness and austerity of
    the pre-sunrise hour, when the world is quiet and the mind
    turns naturally inward.
