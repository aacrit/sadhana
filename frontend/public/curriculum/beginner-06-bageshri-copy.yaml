# --- THEORY NOTE ---------------------------------------------------

theory_note:
  title: "Raga Bageshri"
  body: |
    Bageshri is an audava-sampoorna raga of the Kafi thaat. Its ascent
    uses five swaras (Sa Ga Ma Dha Ni Sa -- omitting Re), while its
    descent uses all seven. Bageshri shares its komal Ga and komal Ni
    with Bhimpalasi, but the two ragas are distinct: Bhimpalasi rises in
    arcs, Bageshri circles its vadi, Ma. The samvadi is Sa. Bageshri's
    rasa is shringar -- romantic longing, the ache of separation. It
    belongs to the late night, prahara 7-8.

# --- WESTERN BRIDGE ------------------------------------------------

western_bridge:
  title: "Western Equivalent"
  body: |
    Western listeners may find the circling quality of Bageshri unfamiliar.
    In Western music, melody tends toward linear progression -- up or down.
    Bageshri's phrases orbit a centre (Ma) without resolving, creating a
    quality of sustained longing that has no standard Western parallel. The
    komal Ga and Ni suggest Dorian or Aeolian flavours, but the identity
    lies in the movement, not the scale.

# --- CULTURAL NOTE -------------------------------------------------

cultural_note:
  title: "Midnight and Separation"
  body: |
    Bageshri belongs to midnight -- the hour when the world sleeps and
    longing is keenest. In the Ragamala painting tradition, Bageshri is
    depicted as a woman waiting for her beloved, gazing at the moon. The
    raga's circling phrases mirror the restlessness of that waiting. It
    shares Kafi thaat with Bhimpalasi (afternoon) -- the same swaras
    inhabit different hours, different emotional landscapes.
