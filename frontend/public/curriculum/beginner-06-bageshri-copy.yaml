      Sa Ni Dha Pa Ma Ga Re Sa.
      Seven notes down. The full picture.

  compare_bhimpalasi:
    screen_title: "You Know These Swaras"
    body: |
      In Bhimpalasi, they rise upward. Yearning.

  compare_bageshri:
    screen_title: "A Different World"
    body: |
      In Bageshri, they circle. Same notes. Different raga.
      This is the deepest lesson: a raga is not its notes.

  meet_bageshri:
    screen_title: "The Ascending Swaras"
    body: |
      Bageshri leaps from Sa to Ga. Re is absent.
      Listen to each one.
