# Lesson B-04: Raga Bhairav — The Dawn Raga
# Journey: Beginner | Level: Shishya (1-3)
# Presence Rule: you hear before you name.
# Rewritten: 5 phases, ~10 min, Tantri-centric.

id: beginner-04-bhairav
journey: beginner
level_range: [1, 3]          # Shishya
raga_id: bhairav
duration_target_min: 10
xp_award: 35

meta:
  title: "The Dawn Raga"
  subtitle: "Raga Bhairav"
  time_of_day: dawn           # prahara 1
  rasa: karuna                # pathos, gravitas

# --- PHASES -------------------------------------------------------

phases:

  # 1. LISTEN — tanpura, first light
  - id: listen
    type: tanpura_drone
    duration_s: 20
    instruction: |
      Close your eyes. Listen.
      The tanpura is with you. First light.
    tanpura:
      strings: [Pa, Sa, Sa, Sa_upper]
      sa_hz: null

  # 2. SA DETECTION — skipped if already done
  - id: sa_calibration
    type: sa_detection
    skip_if: sa_already_set
    instruction: |
      Let's confirm your Sa.
      Hum or sing a comfortable note. Hold it steady.
    attempts: 5
    min_clarity: 0.85
    fallback_hz: 261.6256

  # 3. MEET KOMAL RE AND KOMAL DHA — the defining swaras
  - id: meet_bhairav
    type: swara_introduction
    instruction: |
      Bhairav has two lowered notes. Komal Re and komal Dha.
      They sit just below their natural positions.
      Together they give this raga its gravity.
      Listen to each note — natural first, then lowered.
    swaras: [Re, Re_k, Dha, Dha_k, Sa, Re_k, Ga, Ma, Pa, Dha_k, Ni]
    presentation: sequential
    audio_first: true

  # 4. SING ALONG — Bhairav's opening phrase (pakad)
  - id: sing_opening
    type: sing_along
    phrase: [Sa, Re_k, Ga, Re_k, Sa]
    instruction: |
      This is how Bhairav begins. Sa, komal Re, Ga, komal Re, Sa.
      Follow the guide. Let komal Re pull you back toward home.
      The way it dwells on komal Re — that is Bhairav.
    guide_tone: true
    feedback_layer: minimal

  # 5. COMPLETION
  - id: complete
    type: session_summary
    show_accuracy: true
    show_streak: true
    message: |
      You have met Bhairav.
      Before sunrise, when the world is still and the air is heavy —
      this raga belongs to that silence.

# --- ENGINE PARAMETERS --------------------------------------------

engine:
  raga_grammar_active: true
  pakad_recognition: false
  ornaments_shown: false
  cents_display: hidden
  accuracy_model: shishya

# --- UNLOCK CONDITION ---------------------------------------------

unlock_next:
  lesson_id: beginner-05-bhimpalasi
  requires:
    min_sessions: 1
    min_accuracy: 0.60
