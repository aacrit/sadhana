lesson_id: beginner-08-challenge

# --- PHASE COPY ----------------------------------------------------

phases:

  listen:
    screen_title: "The Challenge"
    body: |
      The tanpura is playing.
      This is not a test. It is a measure of how far you've come.
      There is no failure. Only practice.
    audio_label: null

  sa_calibration:
    screen_title: "Find Your Sa"
    body: |
      Confirm your Sa. Hold it steady.
    prompt: "Sing or hum a comfortable note."
    calibrating_message: "Listening..."
    success_message: "That's your Sa."

  challenge_sa_pa:
    screen_title: "Sa and Pa"
    body: |
      Sing Sa and hold it steady for five seconds.
      Then Pa. Five seconds.
    feedback:
      passed: "Sa and Pa are steady."
      needs_work_sa: "Sa is not quite settled. Try again."
      needs_work_pa: "Pa needs more precision. Listen to the tanpura's Pa string."
      failed: "Keep practising. Sa and Pa are the foundation."

  challenge_aroha_avaroha:
    screen_title: "Three Ragas"
    body: |
      Choose three ragas. Sing each one up and down.
      No guide tone. Just you and the tanpura.
    raga_selection_prompt: "Choose a raga."
    feedback:
      passed: "The ragas are in your voice."
      needs_work: "Some swaras are not yet settled. Return to them."
      failed: "Practise the aroha and avaroha of each raga. They will come."

  challenge_pakad:
    screen_title: "Signature Phrases"
    body: |
      Sing the signature phrase of two different ragas.
      Choose the ragas you feel most strongly.
    raga_selection_prompt: "Choose a raga."
    feedback:
      passed: "The engine heard the raga in your voice."
      needs_work: "The character is not yet distinct. Listen to the pakad again."
      failed: "Return to the ragas. Sing with them. The signature will come."

  complete:
    screen_title_in_progress: "Progress Saved"
    screen_title_complete: "Shishya Complete"
    xp_line: "+100 XP"
    streak_line: null
    progress_note: |
      {passed_count}/3 challenges completed.
      {sessions_remaining} session(s) remaining.

# --- THEORY NOTE ---------------------------------------------------

theory_note:
  title: "The Shishya Path"
  body: |
    The word shishya means "student" -- one who sits at the feet of the
    guru and listens. You have listened to five ragas, learned their
    swaras, heard their signatures. The challenge asks you to demonstrate
    consistency: not one good attempt, but stable accuracy across multiple
    sessions. In the gharana tradition, a guru does not advance a student
    after one good day. The swaras must settle into the voice over time.

# --- CULTURAL NOTE -------------------------------------------------

cultural_note:
  title: "Three Sessions"
  body: |
    The requirement to complete this challenge across three separate
    sessions reflects a core principle of the gurukul: mastery is
    demonstrated through consistency, not intensity. A swara that is
    accurate today but forgotten tomorrow has not been learned. The
    guru waits until the student can reproduce the raga naturally,
    without effort, across days and moods. Only then does the teaching
    deepen.
