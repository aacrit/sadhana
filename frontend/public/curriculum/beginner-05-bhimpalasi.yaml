# Lesson B-05: Raga Bhimpalasi — The Afternoon Raga
# Journey: Beginner | Level: Shishya (1-3)
# Presence Rule: you hear before you name.
# Rewritten: 6 phases, ~10 min, Tantri-centric.

id: beginner-05-bhimpalasi
journey: beginner
level_range: [1, 3]          # Shishya
raga_id: bhimpalasi
duration_target_min: 10
xp_award: 40

meta:
  title: "The Afternoon Raga"
  subtitle: "Raga Bhimpalasi"
  time_of_day: afternoon      # prahara 3-4
  rasa: karuna                # pathos, longing

# --- PHASES -------------------------------------------------------

phases:

  # 1. LISTEN — tanpura, afternoon light
  - id: listen
    type: tanpura_drone
    duration_s: 20
    instruction: |
      Close your eyes. Listen.
      The tanpura is with you. Afternoon light.
    tanpura:
      strings: [Pa, Sa, Sa, Sa_upper]
      sa_hz: null

  # 2. SA DETECTION — skipped if already done
  - id: sa_calibration
    type: sa_detection
    skip_if: sa_already_set
    instruction: |
      Let's confirm your Sa.
      Hum or sing a comfortable note. Hold it steady.
    attempts: 5
    min_clarity: 0.85
    fallback_hz: 261.6256

  # 3. MEET THE KOMAL SWARAS — Ga and Ni, the defining colors
  - id: meet_bhimpalasi
    type: swara_introduction
    instruction: |
      Bhimpalasi has two lowered notes. Komal Ga and komal Ni.
      Komal Ga gives it tenderness. Komal Ni gives it yearning.
      Listen to each — natural first, then lowered.
    swaras: [Ga, Ga_k, Ni, Ni_k, Sa, Ga_k, Ma, Pa, Ni_k]
    presentation: sequential
    audio_first: true

  # 4. HEAR THE ASYMMETRY — five up, seven down
  - id: aroha_listen
    type: phrase_playback
    phrase: [Ni_k_mandra, Sa, Ga_k, Ma, Pa, Ni_k, Sa_upper]
    instruction: |
      Listen to Bhimpalasi climbing. Five notes going up.
      Re and Dha are absent from the ascent. Listen for the gaps.
    repeat: 2
    show_labels: true

  # 5. HEAR THE DESCENT — all seven notes appear
  - id: avaroha_listen
    type: phrase_playback
    phrase: [Sa_upper, Ni_k, Dha, Pa, Ma, Ga_k, Re, Sa]
    instruction: |
      Now descending. All seven notes appear.
      Five up, seven down. The asymmetry is the raga.
      The descent is where Bhimpalasi opens up and speaks.
    repeat: 2
    show_labels: true

  # 6. SING ALONG — the signature phrase
  - id: sing_pakad
    type: sing_along
    phrase: [Ni_k_mandra, Sa, Ga_k, Ma]
    instruction: |
      Follow the guide. This is Bhimpalasi's signature:
      Ni Sa Ga Ma. A rising arc that arrives on Ma.
      Ma is the heart of this raga.
    guide_tone: true
    feedback_layer: minimal

  # 7. COMPLETION
  - id: complete
    type: session_summary
    show_accuracy: true
    show_streak: true
    message: |
      You have met Bhimpalasi.
      In the afternoon, when shadows lengthen and the day softens —
      this raga carries that tenderness.

# --- ENGINE PARAMETERS --------------------------------------------

engine:
  raga_grammar_active: true
  pakad_recognition: false
  ornaments_shown: false
  cents_display: hidden
  accuracy_model: shishya

# --- UNLOCK CONDITION ---------------------------------------------

unlock_next:
  lesson_id: beginner-06-bageshri
  requires:
    min_sessions: 1
    min_accuracy: 0.60
