# Lesson B-01: Your First Raga — Bhoopali
# Journey: Beginner | Level: Shishya (1-3)
# Presence Rule: you hear before you name.
# Rewritten: 5 phases, ~10 min, Tantri-centric.

id: beginner-01-bhoopali
journey: beginner
level_range: [1, 3]          # Shishya
raga_id: bhoopali
duration_target_min: 10
xp_award: 30

meta:
  title: "Your First Raga"
  subtitle: "Raga Bhoopali"
  time_of_day: evening        # prahara 4-5, dusk
  rasa: shant                 # peaceful, serene

# ─── PHASES ──────────────────────────────────────────────────

phases:

  # 1. LISTEN — tanpura arrives, student settles
  - id: listen
    type: tanpura_drone
    duration_s: 20
    instruction: |
      Close your eyes. Listen.
      This is the tanpura. It will always be here with you.
    tanpura:
      strings: [Pa, Sa, Sa, Sa_upper]
      sa_hz: null

  # 2. SA DETECTION — calibrate (skipped after first session)
  - id: sa_calibration
    type: sa_detection
    skip_if: sa_already_set
    instruction: |
      We'll find your Sa — the home note, the anchor.
      Hum or sing a comfortable note. Hold it steady.
    attempts: 5
    min_clarity: 0.85
    fallback_hz: 261.6256

  # 3. MEET THE RAGA — five swaras of Bhoopali, one at a time
  - id: meet_bhoopali
    type: swara_introduction
    instruction: |
      Bhoopali uses only five notes.
      That is why it feels so open, so complete.
    swaras: [Sa, Re, Ga, Pa, Dha]
    presentation: sequential
    audio_first: true

  # 4. SING ALONG — aroha, guided by teacher phrase
  - id: sing_aroha
    type: sing_along
    phrase: [Sa, Re, Ga, Pa, Dha]
    instruction: |
      Follow the guide up: Sa Re Ga Pa Dha.
      Let each note land before the next one arrives.
    guide_tone: true
    feedback_layer: minimal

  # 5. COMPLETION
  - id: complete
    type: session_summary
    show_accuracy: true
    show_streak: true
    message: |
      You have met Bhoopali.
      At dusk, when the last light turns gold — this raga is yours.

# ─── ENGINE PARAMETERS ───────────────────────────────────────

engine:
  raga_grammar_active: true
  pakad_recognition: false
  ornaments_shown: false
  cents_display: hidden
  accuracy_model: shishya

# ─── UNLOCK CONDITION ────────────────────────────────────────

unlock_next:
  lesson_id: beginner-02-sa-pa-drone
  requires:
    min_sessions: 1
    min_accuracy: 0.60
