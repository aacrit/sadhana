# Lesson B-07: The Five Ragas — Consolidation
# Journey: Beginner | Level: Shishya (1-3)
# Presence Rule: you hear before you name.
# Rewritten: 3 phases, ~8 min, Tantri-centric.

id: beginner-07-consolidation
journey: beginner
level_range: [1, 3]          # Shishya
raga_id: null                # multi-raga review
duration_target_min: 8
xp_award: 50

meta:
  title: "The Five Ragas"
  subtitle: "Consolidation"
  time_of_day: null
  rasa: null

# --- PHASES -------------------------------------------------------

phases:

  # 1. LISTEN — brief settling, tanpura open context
  - id: listen
    type: tanpura_drone
    duration_s: 15
    instruction: |
      Close your eyes. Listen.
      Today you revisit the five ragas you have learned.
    tanpura:
      strings: [Pa, Sa, Sa, Sa_upper]
      sa_hz: null

  # 2. RAGA IDENTIFICATION — engine plays pakad, student echoes in that raga
  # Three rounds. All five ragas in play. No repeat in a single session.
  - id: identification
    type: raga_identification
    instruction: |
      Listen to each phrase. Then sing a few notes in that raga's character.
    raga_pool: [bhoopali, yaman, bhairav, bhimpalasi, bageshri]
    selection: random_no_repeat
    rounds: 3
    pakad_plays: 2
    student_response: sing
    response_duration_s: 15
    feedback_layer: standard
    level_tolerance: shishya

  # 3. COMPLETION
  - id: complete
    type: session_summary
    show_accuracy: true
    show_streak: true
    message: |
      Five ragas. Five worlds.
      You carry them with you now.

# --- ENGINE PARAMETERS --------------------------------------------

engine:
  raga_grammar_active: true
  pakad_recognition: true
  ornaments_shown: false
  cents_display: hidden
  accuracy_model: shishya

# --- UNLOCK CONDITION ---------------------------------------------

unlock_next:
  lesson_id: beginner-08-challenge
  requires:
    min_sessions: 1
    min_accuracy: 0.60
