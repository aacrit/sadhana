# Lesson S-06: Raga Grammar — Aroha/Avaroha Rules
# Journey: Explorer | Level: Sadhaka (4-6)
# Presence Rule: you hear before you name.
# Uses Bhimpalasi and Bageshri as case studies.
# NEW PHASE TYPE: grammar_exercise
# Engine source: engine/analysis/raga-grammar.ts

id: sadhaka-06-grammar
journey: explorer
level_range: [4, 6]          # Sadhaka
raga_id: null                # multi-raga grammar analysis
duration_target_min: 12
xp_award: 40

meta:
  title: "The Rules of Movement"
  subtitle: "Raga Grammar"
  time_of_day: null
  rasa: null

# --- PHASES -------------------------------------------------------

phases:

  # 1. LISTENING
  - id: listen
    type: tanpura_drone
    duration_s: 20
    instruction: |
      The tanpura is with you.
      Today you learn why certain phrases feel right in certain ragas —
      and why others feel wrong.
    tanpura:
      strings: [Pa, Sa, Sa, Sa_upper]
      sa_hz: null

  # 2. SA DETECTION
  - id: sa_calibration
    type: sa_detection
    skip_if: sa_already_set
    instruction: |
      Confirm your Sa.
    attempts: 5
    min_clarity: 0.85
    fallback_hz: 261.6256

  # 3. HEAR A VALID PHRASE — Bhimpalasi aroha
  - id: valid_bhimpalasi
    type: phrase_playback
    phrase: [Ni_k_mandra, Sa, Ga_k, Ma, Pa]
    instruction: |
      Listen to this phrase in Bhimpalasi.
      It skips Re. It skips Dha. Going up, it must.
    repeat: 2
    show_labels: true

  # 4. HEAR AN INVALID PHRASE — Bhimpalasi aroha with Re
  - id: invalid_bhimpalasi
    type: phrase_playback
    phrase: [Sa, Re, Ga_k, Ma, Pa]
    instruction: |
      Now listen to this. Same swaras. But Re is in the ascent.
      This is not Bhimpalasi. The raga has rules.
    repeat: 1
    show_labels: true

  # 5. EXPLAIN THE RULE
  - id: explain_grammar
    type: phrase_playback
    phrase: [Ni_k_mandra, Sa, Ga_k, Ma, Pa, Dha, Ni_k, Sa_upper]
    instruction: |
      Bhimpalasi's rule: skip Re and Dha going up.
      The ascent is spare. The descent is full.
      Sa Ga Ma Pa — five notes up. All seven down.
      This is jati: audava-sampoorna. Five ascending, seven descending.
    repeat: 1
    show_labels: true

  # 6. GRAMMAR EXERCISE ROUND 1 — Bhimpalasi valid/invalid
  - id: grammar_round_1
    type: grammar_exercise              # NEW PHASE TYPE
    instruction: |
      Listen to each phrase. Is it valid in Bhimpalasi?
      The raga's grammar will tell you.
    raga_id: bhimpalasi
    rounds: 4
    phrases:
      - phrase: [Sa, Ga_k, Ma, Pa]
        valid: true
        explanation: "Correct. Re skipped in ascent."
      - phrase: [Sa, Re, Ga_k, Ma]
        valid: false
        explanation: "Re appears in ascent. Bhimpalasi skips Re going up."
      - phrase: [Sa_upper, Ni_k, Dha, Pa, Ma, Ga_k, Re, Sa]
        valid: true
        explanation: "Correct. All swaras present in descent — Re returns."
      - phrase: [Pa, Dha, Ni_k, Sa_upper]
        valid: false
        explanation: "Dha in ascent. Bhimpalasi omits Dha going up."
    feedback_layer: standard

  # 7. COMPARE BAGESHRI — same swaras, different rules
  - id: bageshri_grammar
    type: phrase_playback
    phrase: [Sa, Ga_k, Ma, Dha, Ni_k, Sa_upper]
    instruction: |
      Now Bageshri. Same swaras as Bhimpalasi. But Bageshri's ascent is different.
      Sa Ga Ma Dha Ni Sa — Re skipped, but Dha stays.
      Different grammar. Different raga.
    repeat: 2
    show_labels: true

  # 8. GRAMMAR EXERCISE ROUND 2 — Bageshri valid/invalid
  - id: grammar_round_2
    type: grammar_exercise
    instruction: |
      Is it Bageshri?
    raga_id: bageshri
    rounds: 4
    phrases:
      - phrase: [Sa, Ga_k, Ma, Dha]
        valid: true
        explanation: "Correct. Bageshri skips Re in ascent, keeps Dha."
      - phrase: [Sa, Re, Ga_k, Ma]
        valid: false
        explanation: "Re in ascent. Bageshri omits Re going up."
      - phrase: [Sa_upper, Ni_k, Dha, Pa, Ma, Ga_k, Re, Sa]
        valid: true
        explanation: "Correct. Full descent with all swaras."
      - phrase: [Sa, Ma, Pa, Dha]
        valid: false
        explanation: "Ga skipped. Bageshri's ascent needs Ga — the Sa-Ga leap is part of its identity."
    feedback_layer: standard

  # 9. GRAMMAR EXERCISE ROUND 3 — Mixed ragas
  - id: grammar_round_3
    type: grammar_exercise
    instruction: |
      Now both ragas. Listen. Which grammar is this?
    raga_id: null                       # mixed — engine identifies per phrase
    rounds: 4
    phrases:
      - phrase: [Ni_k_mandra, Sa, Ga_k, Ma, Pa]
        valid_in: bhimpalasi
        explanation: "Bhimpalasi. The Ni from below rises to Sa, then skips Re."
      - phrase: [Sa, Ga_k, Ma, Dha, Ni_k]
        valid_in: bageshri
        explanation: "Bageshri. Dha appears in ascent — Bhimpalasi would omit it."
      - phrase: [Sa, Ma, Ga_k, Ma]
        valid_in: bageshri
        explanation: "Bageshri's pakad. The circling around Ma."
      - phrase: [Ga_k, Ma, Pa, Dha, Ni_k]
        valid_in: bhimpalasi
        explanation: "Bhimpalasi. This ascending phrase, with Dha, works because it starts above the omission point."
    feedback_layer: standard

  # 10. FREE SINGING WITH GRAMMAR FEEDBACK
  - id: grammar_free
    type: passive_phrase_recognition
    enabled: true
    instruction: |
      Sing freely in Bhimpalasi. The engine listens for grammar.
      If you use Re going up, you will feel it — the raga loses its shape.
      Stay within the rules. Let them guide you.
    duration_s: 45
    raga_id: bhimpalasi
    grammar_feedback: true
    watch_for_pakad: true
    pakad_reward:
      xp_bonus: 10
      ceremony: gsap_pakad_moment

  # 11. COMPLETION
  - id: complete
    type: session_summary
    show_accuracy: true
    show_streak: true
    message: |
      Ragas have grammar — rules of movement.
      Not just which notes. Which direction. Which sequence.
      The same seven swaras, two entirely different architectures.
      This is what makes a raga a raga.

# --- ENGINE PARAMETERS --------------------------------------------

engine:
  raga_grammar_active: true
  pakad_recognition: true
  ornaments_shown: true
  cents_display: on_tap
  accuracy_model: sadhaka

# --- UNLOCK CONDITION ---------------------------------------------

unlock_next:
  lesson_id: sadhaka-07-gamak
  requires:
    min_sessions: 1
    min_accuracy: 0.65
