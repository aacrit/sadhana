# Lesson B-03: Raga Yaman — The Evening Raga
# Journey: Beginner | Level: Shishya (1-3)
# Presence Rule: you hear before you name.
# Rewritten: 5 phases, ~10 min, Tantri-centric.

id: beginner-03-yaman
journey: beginner
level_range: [1, 3]          # Shishya
raga_id: yaman
duration_target_min: 10
xp_award: 35

meta:
  title: "The Evening Raga"
  subtitle: "Raga Yaman"
  time_of_day: evening        # prahara 5-6
  rasa: shant

# --- PHASES -------------------------------------------------------

phases:

  # 1. LISTEN — tanpura in Yaman's context
  - id: listen
    type: tanpura_drone
    duration_s: 20
    instruction: |
      Close your eyes. Listen.
      The tanpura is with you. Evening light.
    tanpura:
      strings: [Pa, Sa, Sa, Sa_upper]
      sa_hz: null

  # 2. SA DETECTION — skipped if already done
  - id: sa_calibration
    type: sa_detection
    skip_if: sa_already_set
    instruction: |
      Let's confirm your Sa.
      Hum or sing a comfortable note. Hold it steady.
    attempts: 5
    min_clarity: 0.85
    fallback_hz: 261.6256

  # 3. MEET TIVRA MA — the defining swara of Yaman
  - id: meet_yaman
    type: swara_introduction
    instruction: |
      Yaman has one note that sets it apart. A raised fourth.
      Listen to the difference: natural Ma, then tivra Ma.
      That raised note lifts every phrase upward.
    swaras: [Ma, Ma_t, Sa, Re, Ga, Ma_t, Pa, Dha, Ni]
    presentation: sequential
    audio_first: true

  # 4. HEAR THE AROHA — see it move
  - id: aroha_playback
    type: phrase_playback
    phrase: [Ni_mandra, Re, Ga, Ma_t, Pa, Dha, Ni, Sa_upper]
    instruction: |
      Listen to Yaman climbing. It begins below Sa, from Ni.
      The tivra Ma pulls every phrase upward.
    repeat: 2
    show_labels: true

  # 5. SING ALONG — follow the aroha
  - id: sing_aroha
    type: sing_along
    phrase: [Sa, Re, Ga, Ma_t, Pa, Dha]
    instruction: |
      Follow the guide up through Yaman.
      When you reach tivra Ma — notice how it lifts.
    guide_tone: true
    feedback_layer: minimal

  # 6. COMPLETION (Note: lesson counts as 5 because sa_calibration skips after first run)
  - id: complete
    type: session_summary
    show_accuracy: true
    show_streak: true
    message: |
      You have met Yaman.
      In the evening, when the world grows quiet and lamps are lit —
      this raga lives there.

# --- ENGINE PARAMETERS --------------------------------------------

engine:
  raga_grammar_active: true
  pakad_recognition: false
  ornaments_shown: false
  cents_display: hidden
  accuracy_model: shishya

# --- UNLOCK CONDITION ---------------------------------------------

unlock_next:
  lesson_id: beginner-04-bhairav
  requires:
    min_sessions: 1
    min_accuracy: 0.60
