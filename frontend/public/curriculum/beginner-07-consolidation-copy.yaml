phases:

  listen:
    screen_title: "Listen"
    body: |
      Close your eyes.
      The tanpura is playing. Today you revisit old friends.
    audio_label: null

  sa_calibration:
    screen_title: "Find Your Sa"
    body: |
      Sa is the home note. Everything starts and returns here.
      Hum or sing a comfortable pitch. Hold it steady.
    prompt: "Sing or hum a comfortable note."
    calibrating_message: "Listening..."
    success_message: "That's your Sa."

  round_1:
    screen_title: "Which Raga?"
    body: |
      Listen to this phrase. Which raga is it?
      After you hear it, sing a few notes in that raga's character.
    feedback:
      correct: "You recognised it."
      incorrect: "Listen again next time. The phrase will tell you."
      no_response: "Whenever you're ready. Sing what you heard."

  round_2:
    screen_title: "Which Raga?"
    body: |
      Another phrase. Listen carefully.
    feedback:
      correct: "Correct."
      incorrect: "Not quite. The character is in the movement, not just the notes."
      no_response: "Whenever you're ready."

  round_3:
    screen_title: "Which Raga?"
    body: |
      And another. Let the phrase speak.
    feedback:
      correct: "Correct."
      incorrect: "Not this time. You'll hear it differently next session."
      no_response: "Whenever you're ready."

  round_4:
    screen_title: "Which Raga?"
    body: |
      Listen.
    feedback:
      correct: "Correct."
      incorrect: "Listen for the signature movement."
      no_response: "Whenever you're ready."

  round_5:
    screen_title: "Which Raga?"
    body: |
      One more.
    feedback:
      correct: "Correct."
      incorrect: "Not quite. But your ear is sharpening."
      no_response: "Whenever you're ready."

  complete:
    screen_title: "Session Complete"
    xp_line: "+50 XP"
    streak_line: null
    summary_format: |
      Ragas recognised: {correct_count}/5

# --- THEORY NOTE ---------------------------------------------------

theory_note:
  title: "Five Ragas, Five Worlds"
  body: |
    You now know five ragas: Bhoopali, Yaman, Bhairav, Bhimpalasi, and
    Bageshri. They span dawn to midnight, five notes to seven, shuddha
    to komal. The ability to hear a phrase and recognise which raga it
    belongs to is the foundation of musical intelligence. A raga is not
    just a scale -- it is a way of moving. Two ragas with the same notes
    (Bhimpalasi and Bageshri) sound completely different because their
    movement patterns, their pakads, are different.

# --- CULTURAL NOTE -------------------------------------------------

cultural_note:
  title: "The Ear of the Listener"
  body: |
    In a Hindustani concert, the audience recognises the raga within
    the first few notes of the alap. This recognition is not intellectual
    -- it is felt. The komal Re that begins Bhairav, the Ni-Re-Ga that
    opens Yaman, the circling Ma of Bageshri -- each is instantly
    identifiable to a trained ear. You are developing that ear now.
