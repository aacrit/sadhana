# Lesson B-06: Raga Bageshri — The Midnight Raga
# Journey: Beginner | Level: Shishya (1-3)
# Presence Rule: you hear before you name.
# Rewritten: 6 phases, ~10 min, Tantri-centric.

id: beginner-06-bageshri
journey: beginner
level_range: [1, 3]          # Shishya
raga_id: bageshri
duration_target_min: 10
xp_award: 40

meta:
  title: "The Midnight Raga"
  subtitle: "Raga Bageshri"
  time_of_day: night           # prahara 7-8
  rasa: shringar               # romantic longing, separation

# --- PHASES -------------------------------------------------------

phases:

  # 1. LISTEN — midnight atmosphere
  - id: listen
    type: tanpura_drone
    duration_s: 20
    instruction: |
      Close your eyes. Listen.
      The tanpura is with you. Midnight.
    tanpura:
      strings: [Pa, Sa, Sa, Sa_upper]
      sa_hz: null

  # 2. SA DETECTION — skipped if already done
  - id: sa_calibration
    type: sa_detection
    skip_if: sa_already_set
    instruction: |
      Let's confirm your Sa.
      Hum or sing a comfortable note. Hold it steady.
    attempts: 5
    min_clarity: 0.85
    fallback_hz: 261.6256

  # 3. MEET BAGESHRI — komal Ga, komal Ni, the Sa-to-Ma leap
  - id: meet_bageshri
    type: swara_introduction
    instruction: |
      Bageshri shares two swaras with Bhimpalasi — komal Ga and komal Ni.
      But here they feel different. More restless. More obsessive.
      Listen to each note.
    swaras: [Ga, Ga_k, Ni, Ni_k, Sa, Ga_k, Ma, Dha, Ni_k]
    presentation: sequential
    audio_first: true

  # 4. HEAR THE ASCENT — Re is absent
  - id: aroha_listen
    type: phrase_playback
    phrase: [Sa, Ga_k, Ma, Dha, Ni_k, Sa_upper]
    instruction: |
      Listen to Bageshri climbing. It leaps from Sa to komal Ga.
      Re is absent. That gap is deliberate. The leap creates urgency.
    repeat: 2
    show_labels: true

  # 5. HEAR THE SIGNATURE PHRASE — Sa Ma Ga Ma, circling
  - id: pakad_listen
    type: phrase_playback
    phrase: [Sa, Ma, Ga_k, Ma]
    instruction: |
      This is Bageshri's signature. Sa Ma Ga Ma.
      It circles Ma. Obsessive. A different kind of longing than Bhimpalasi.
      Same swaras. Different world.
    repeat: 3
    show_labels: true

  # 6. SING ALONG — the pakad phrase
  - id: sing_pakad
    type: sing_along
    phrase: [Sa, Ma, Ga_k, Ma]
    instruction: |
      Follow the guide. Sa Ma Ga Ma.
      Let the raga circle. Do not rush.
    guide_tone: true
    feedback_layer: minimal

  # 7. COMPLETION
  - id: complete
    type: session_summary
    show_accuracy: true
    show_streak: true
    message: |
      You have met Bageshri.
      At midnight, when the world is asleep and longing is sharpest —
      this raga carries that ache.

# --- ENGINE PARAMETERS --------------------------------------------

engine:
  raga_grammar_active: true
  pakad_recognition: false
  ornaments_shown: false
  cents_display: hidden
  accuracy_model: shishya

# --- UNLOCK CONDITION ---------------------------------------------

unlock_next:
  lesson_id: beginner-07-consolidation
  requires:
    min_sessions: 1
    min_accuracy: 0.60
