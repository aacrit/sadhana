lesson_id: sadhaka-05-teentaal

# --- PHASE COPY ----------------------------------------------------

phases:

  listen_tala:
    screen_title: "Listen"
    body: |
      Close your eyes.
      The tanpura and the tabla. A pulse. A cycle.

  sa_calibration:
    screen_title: "Find Your Sa"
    body: |
      Confirm your Sa.
    prompt: "Sing or hum a comfortable note."
    calibrating_message: "Listening..."
    success_message: "That's your Sa."

  hear_structure:
    screen_title: "Teentaal"
    body: |
      16 beats. Four groups of four.
      Listen to the theka — the basic tabla pattern.
    beat_display: |
      Dha Dhin Dhin Dha | Dha Dhin Dhin Dha |
      Dha Tin  Tin  Ta  | Ta  Dhin Dhin Dha

  hear_sam:
    screen_title: "Sam"
    body: |
      The first beat. The anchor. The strongest moment.
      Everything returns here.

  hear_khali:
    screen_title: "Khali"
    body: |
      Beat 9. The empty beat. The bass drum goes silent.
      "Ta" instead of "Dha." Listen for the absence.

  clap_sam:
    screen_title: "Find Sam"
    body: |
      Clap on the first beat. One clap per cycle.
    feedback:
      on_time: "Sam."
      early: "Too early. Wait for the Dha."
      late: "Late. Anticipate the arrival."
      missed: "Listen for the strongest beat."

  clap_sam_khali:
    screen_title: "Sam and Khali"
    body: |
      Clap on beat 1. Wave on beat 9.
      The wave is the visual of "empty."
    feedback:
      both_correct: "Sam and khali, both found."
      sam_missed: "You missed sam."
      khali_missed: "Khali was missed. Listen for the absent bass."

  sing_sa_on_sam:
    screen_title: "Sing on Sam"
    body: |
      Sing Sa on the first beat. Hold it through the cycle.
      When sam returns, renew.
    feedback:
      on_time: "Sa on sam."
      off_time: "Not quite on sam. Feel the cycle."
      off_pitch: "Pitch is off. Settle on Sa first, then find sam."

  free_tala:
    screen_title: "Free Practice"
    body: |
      Clap, wave, sing. Feel the cycle.

  complete:
    screen_title: "Session Complete"
    xp_line: "+35 XP"
    streak_line: null

# --- THEORY NOTE ---------------------------------------------------

theory_note:
  title: "Teentaal — The Most Common Tala"
  body: |
    Teentaal (or Tintal) is the most widely used tala in Hindustani
    music. It has 16 beats (matras) divided into four vibhags of
    four beats each. Sam (beat 1) is the anchor — the point of
    arrival and departure. Khali (beat 9) is the "empty" beat —
    the bayan (bass tabla) goes silent, and the clap is replaced
    by a wave. The theka (basic pattern) is:
    Dha Dhin Dhin Dha | Dha Dhin Dhin Dha |
    Dha Tin Tin Ta | Ta Dhin Dhin Dha.
    Tala is not a metronome. It is a cycle — a repeating structure
    with landmarks that the musician navigates like a map.

# --- WESTERN BRIDGE ------------------------------------------------

western_bridge:
  title: "Western Equivalent"
  body: |
    Teentaal's 16 beats can be felt as four bars of 4/4 time, but
    the comparison is misleading. Western time signatures are linear
    — measure 1, measure 2, measure 3. Tala is cyclical — the
    16th beat leads inevitably back to sam. The concept of khali
    (a structurally "empty" beat) has no Western equivalent. The
    cycle, not the bar line, is the fundamental unit.

# --- CULTURAL NOTE -------------------------------------------------

cultural_note:
  title: "The Tabla and the Voice"
  body: |
    In a Hindustani concert, the vocalist and the tabla player are
    in constant dialogue. The vocalist phrases melodies that land on
    sam. The tabla player accompanies, sometimes following, sometimes
    challenging. The moment when both arrive on sam together after
    an extended improvisation is one of the most thrilling moments
    in live music. You are learning to hear this cycle.
