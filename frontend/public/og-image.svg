<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Sādhanā — Hindustani classical music practice">
  <!-- Deep Malachite background (matches --bg-1 night-mode token) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A1A14"/>
      <stop offset="1" stop-color="#0F2418"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.18" cy="0.5" r="0.22">
      <stop offset="0" stop-color="#E8871E" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#E8871E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stringFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E8871E" stop-opacity="0.85"/>
      <stop offset="0.55" stop-color="#E8871E" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#E8871E" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Saffron Sa glow -->
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Tantri Resonance Mark — five strings at just-intonation intervals,
       Bhoopali pentatonic spacing. Strings fade rightward (practice continues). -->
  <g transform="translate(140 215)">
    <!-- Sa terminus (saffron, glowing) — origin point -->
    <circle cx="0" cy="80" r="14" fill="#E8871E" filter="blur(0.5px)" opacity="0.9"/>
    <circle cx="0" cy="80" r="8" fill="#E8871E"/>
    <circle cx="0" cy="80" r="32" fill="none" stroke="#E8871E" stroke-width="0.8" opacity="0.35"/>

    <!-- Five strings — Sa (with standing wave), Re, Ga, Pa, Dha -->
    <!-- Sa: standing wave (fundamental mode) -->
    <path d="M 0 80 Q 200 60 400 80 T 800 80 L 920 80"
          fill="none" stroke="url(#stringFade)" stroke-width="1.6"/>
    <!-- Re — 9/8 ratio above Sa -->
    <line x1="0" y1="40" x2="920" y2="40" stroke="url(#stringFade)" stroke-width="1.0"/>
    <!-- Ga — 5/4 -->
    <line x1="0" y1="0" x2="920" y2="0" stroke="url(#stringFade)" stroke-width="1.0"/>
    <!-- Pa — 3/2 (below Sa) -->
    <line x1="0" y1="120" x2="920" y2="120" stroke="url(#stringFade)" stroke-width="1.0"/>
    <!-- Dha — 5/3 (below) -->
    <line x1="0" y1="160" x2="920" y2="160" stroke="url(#stringFade)" stroke-width="1.0"/>
  </g>

  <!-- Title block (right side) -->
  <g transform="translate(640 200)">
    <!-- Devanagari -->
    <text x="0" y="0"
          font-family="'Noto Serif Devanagari', 'Noto Sans Devanagari', 'Mangal', serif"
          font-size="56" font-weight="400" fill="#F0E6D3" letter-spacing="0.05em">
      साधना
    </text>
    <!-- Romanized -->
    <text x="0" y="80"
          font-family="'Cormorant Garamond', Georgia, serif"
          font-size="92" font-weight="300" fill="#F0E6D3" letter-spacing="0.06em">
      Sādhanā
    </text>
    <!-- Tagline -->
    <text x="0" y="180"
          font-family="'Cormorant Garamond', Georgia, serif"
          font-size="32" font-style="italic" font-weight="300" fill="#B8A99A" letter-spacing="0.02em">
      Hindustani classical practice
    </text>
    <text x="0" y="220"
          font-family="'Cormorant Garamond', Georgia, serif"
          font-size="24" font-style="italic" font-weight="300" fill="#7A6B5E" letter-spacing="0.02em">
      Tanpura · Pitch · 22 shrutis
    </text>
  </g>

  <!-- Footer mark -->
  <text x="600" y="590" text-anchor="middle"
        font-family="'IBM Plex Mono', monospace"
        font-size="14" fill="#7A6B5E" letter-spacing="0.16em">
    SĀDHANĀ · A MUSIC PHYSICS ENGINE
  </text>
</svg>
